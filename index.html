<title>Master Dutton · ITF Taekwon-Do</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0c;--surface:#111115;--card:#16161c;--border:#2a2a35;--text:#c8c8d4;--white:#f0f0f8;--muted:#6b6880;--red:#e8193c;--gold:#c9a84c;--green:#2ea84a}
body{font-family:"Segoe UI",sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;min-height:100vh}
#app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.sbar{display:flex;justify-content:space-between;padding:14px 24px 6px;font-size:12px;font-weight:700;color:var(--white)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 10px;border-bottom:1px solid var(--border)}
.logo{font-size:22px;letter-spacing:2px;color:var(--white);font-weight:900;white-space:nowrap}
.logo span{color:var(--red)}
.badge{background:rgba(232,25,60,.15);border:1px solid rgba(232,25,60,.4);color:var(--red);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.content{flex:1;overflow-y:auto;padding:16px 20px;scrollbar-width:none}
.bnav{display:flex;justify-content:space-around;padding:10px 8px 30px;background:var(--surface);border-top:1px solid var(--border)}
.tb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;border-radius:10px}
.tb.a{background:rgba(232,25,60,.1)}
.tb .ic{font-size:20px}
.tb .lb{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.tb.a .lb{color:var(--red)}
.hero{display:flex;border-radius:14px;background:linear-gradient(135deg,#0f0f1a,#1a0a10);margin-bottom:12px;border:1px solid var(--border);overflow:hidden;min-height:160px}
.htxt{flex:1;padding:18px 16px 18px 20px;display:flex;flex-direction:column;justify-content:center}
.hgr{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.hnm{font-size:26px;color:var(--white);font-weight:900;letter-spacing:2px;line-height:1}
.hnm span{color:var(--red)}
.streak{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:4px 12px;margin-top:10px}
.sn{font-size:20px;color:var(--gold);font-weight:900;line-height:1}
.him{width:140px;flex-shrink:0;overflow:hidden}.him img{width:100%;height:100%;object-fit:cover;object-position:50% 10%;display:block}
.srow{display:flex;gap:10px;margin-bottom:12px}
.sc{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.scn{font-size:26px;color:var(--white);font-weight:900;line-height:1}
.scl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.stitle{font-size:22px;font-weight:900;letter-spacing:2px;color:var(--white);margin:14px 0 4px;text-transform:uppercase}
.btn-p{width:100%;background:linear-gradient(135deg,var(--red),#b01230);border:none;color:#fff;font-size:16px;font-weight:900;letter-spacing:2px;padding:14px;border-radius:14px;cursor:pointer;margin-bottom:10px;text-transform:uppercase}
.bk{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;margin:10px 0 8px;display:block;font-weight:600}
.pill{display:inline-block;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;margin:0 6px 8px 0}
.pill.a{background:rgba(232,25,60,.1);border-color:rgba(232,25,60,.4);color:var(--red)}
.pr{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.pn{font-size:22px;color:rgba(232,25,60,.4);width:28px;font-weight:900;line-height:1}
.pm{font-size:22px;color:var(--gold);font-weight:900;line-height:1}
.tag{display:inline-block;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--muted)}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.mch{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.mcn{font-size:22px;color:var(--red);width:28px;font-weight:900;line-height:1}
.mct{font-size:13px;font-weight:700;color:var(--white)}
.mcd{font-size:11px;color:var(--muted);margin-top:2px}
.mcb{padding:12px 14px;border-top:1px solid var(--border)}
.fs{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:8px}
.qo{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:600;padding:10px 14px;border-radius:10px;cursor:pointer;text-align:left;margin-bottom:8px;display:block;font-family:inherit}
.qo.cor{background:rgba(46,168,74,.15);border-color:rgba(46,168,74,.5);color:var(--green)}
.qo.wrg{background:rgba(232,25,60,.15);border-color:rgba(232,25,60,.5);color:var(--red)}
.spl{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
.spl.h{opacity:0;pointer-events:none}
.sll{font-size:52px;letter-spacing:6px;color:var(--white);font-weight:900;line-height:1;text-align:center}
.sll span{color:var(--red)}
.slln{width:60px;height:3px;background:var(--red);border-radius:2px;margin:20px auto}
.bsc{display:flex;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;-ms-overflow-style:none}
.bsc::-webkit-scrollbar{display:none}
.bc{flex-shrink:0;padding:8px 14px;border-radius:20px;cursor:pointer;background:var(--card);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;margin-right:8px}
.bc.a{background:rgba(232,25,60,.15);border-color:rgba(232,25,60,.4);color:var(--red)}
.rr{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,42,53,.6);cursor:pointer}
.rc{font-size:16px;flex-shrink:0;margin-top:1px}
.rt{font-size:13px;color:var(--text);line-height:1.4}
.rt.dn{color:var(--muted);text-decoration:line-through}
.ytb{display:flex;align-items:center;gap:10px;margin-top:12px;background:rgba(232,25,60,.1);border:1px solid rgba(232,25,60,.3);border-radius:12px;padding:10px 14px;text-decoration:none;color:inherit}
.glr{display:flex;align-items:center;padding:10px 16px}
.pd{background:linear-gradient(135deg,var(--card),var(--surface));border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:10px;margin-bottom:12px}
@media(min-width:430px){body{align-items:center;min-height:100vh}#app{border-radius:44px;max-height:844px;box-shadow:0 40px 120px rgba(0,0,0,.8)}}

.pwd-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}.pwd-screen[style*="display: none"]{pointer-events:none!important}
.pwd-logo{font-size:52px;letter-spacing:6px;color:var(--white);font-weight:900;line-height:1;text-align:center;margin-bottom:8px}
.pwd-logo span{color:var(--red)}
.pwd-line{width:60px;height:3px;background:var(--red);border-radius:2px;margin:16px auto}
.pwd-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--white);font-size:16px;padding:14px 16px;border-radius:12px;outline:none;font-family:inherit;margin-bottom:10px;text-align:center;letter-spacing:2px}
.pwd-btn{width:100%;background:linear-gradient(135deg,var(--red),#b01230);border:none;color:#fff;font-size:18px;font-weight:900;letter-spacing:2px;padding:14px;border-radius:14px;cursor:pointer;text-transform:uppercase}
.pwd-err{color:var(--red);font-size:13px;text-align:center;margin-bottom:10px;min-height:20px}

.belt-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:8888;display:flex;align-items:flex-end;justify-content:center}
.belt-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:20px 20px 40px}
.belt-opt{display:flex;align-items:center;padding:12px 16px;border-radius:12px;cursor:pointer;margin-bottom:6px;border:1px solid var(--border)}
.belt-opt.sel{border-color:rgba(232,25,60,.4);background:rgba(232,25,60,.1)}
.belt-dot{width:28px;height:12px;border-radius:6px;flex-shrink:0;margin-right:14px;border:1px solid rgba(255,255,255,.2)}

.belt-strip{height:4px;width:100%;flex-shrink:0;transition:background .4s ease;}

.pwd-logo{font-size:44px;letter-spacing:6px;color:#f0f0f8;font-weight:900;line-height:1;text-align:center}

.pwd-err{color:#e8193c;font-size:13px;text-align:center;min-height:20px;margin-bottom:8px}
</style></head><body>

<script>
var PWD="tkd399";
window.addEventListener('load',function(){
  if(localStorage.getItem('tkd-auth')===PWD){
    var ps=document.getElementById('pwd-screen');
    if(ps)ps.style.display='none';
  }
});
function checkPwd(){
  var val=document.getElementById('pwd-input').value.trim().toLowerCase();
  if(val===PWD){
    localStorage.setItem('tkd-auth',PWD);
    document.getElementById('pwd-screen').style.display='none';
  } else {
    document.getElementById('pwd-err').textContent='Wrong code — try again';
    document.getElementById('pwd-input').value='';
    document.getElementById('pwd-input').focus();
  }
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('pwd-screen').style.display!=='none')checkPwd();

function showBeltPicker(){
  var existing=document.getElementById('belt-modal');
  if(existing){existing.remove();return;}
  var m=document.createElement('div');
  m.className='belt-modal';m.id='belt-modal';
  var s=document.createElement('div');
  s.className='belt-sheet';
  s.style.cssText='overflow-y:auto;max-height:85vh;';
  s.innerHTML='<div style="font-family:inherit;font-size:16px;font-weight:700;color:var(--white);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;text-align:center">Select Your Belt</div>';
  BELTS.forEach(function(b){
    var d=document.createElement('div');
    var isSelected=BELT===b.name;
    var beltHtml;
    if(b.name.indexOf('Dan')>=0||b.name==="Black Belt"){
      var romans=['','I','II','III','IV','V','VI','VII','VIII','IX'];
      var dan=parseInt(b.name)||1;
      var numeral=romans[Math.min(dan,9)];
      beltHtml='<div style="width:80px;height:20px;border-radius:4px;background:#181818;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,.1)"><span style="color:#c9a84c;font-size:11px;font-weight:900;letter-spacing:1px">'+numeral+'</span></div>';
    } else if(b.stripe){
      beltHtml='<div style="width:80px;height:20px;border-radius:4px;flex-shrink:0;background:'+b.color+';display:flex;flex-direction:column;justify-content:center;align-items:stretch;overflow:hidden;border:1px solid rgba(255,255,255,.1)"><div style="height:5px;background:'+b.color+'"></div><div style="height:6px;background:'+b.stripe+'"></div><div style="height:5px;background:'+b.color+'"></div></div>';
    } else {
      beltHtml='<div style="width:80px;height:20px;border-radius:4px;flex-shrink:0;background:'+b.color+';border:1px solid rgba(255,255,255,.1)"></div>';
    }
    var sub=b.title?'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+b.title+'</div>':'';
    d.style.cssText='background:var(--card);border-radius:12px;padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:14px;border:2px solid '+(isSelected?'rgba(255,255,255,.6)':'transparent')+';';
    d.innerHTML=beltHtml+'<div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--white)">'+b.name+'</div>'+sub+'</div>'+(isSelected?'<span style="color:var(--green);font-size:18px">&#10003;</span>':'');
    d.onclick=function(){
      BELT=b.name;
      localStorage.setItem('tkd-belt',b.name);
      var badge=document.querySelector('.badge');
      if(badge) badge.textContent=b.name+' ▾';
      var strip=document.getElementById('belt-strip');
      if(strip) strip.style.background=b.strip;
      m.remove();
    };
    s.appendChild(d);
  });
  m.appendChild(s);
  m.onclick=function(e){if(e.target===m)m.remove();};
  document.body.appendChild(m);
}

function getStats(){
  var s=JSON.parse(localStorage.getItem('tkd-sessions')||'[]');
  var now=new Date(),wk=new Date(now-604800000);
  var tw=s.filter(function(x){return new Date(x)>wk;}).length;
  var streak=0,c=new Date();c.setHours(0,0,0,0);
  for(var i=0;i<365;i++){
    var ds=c.toDateString();
    if(s.some(function(x){return new Date(x).toDateString()===ds;})){streak++;c.setDate(c.getDate()-1);}
    else if(i===0){c.setDate(c.getDate()-1);}
    else break;
  }
  return{total:s.length,week:tw,streak:streak};
}
function logSession(){
  var s=JSON.parse(localStorage.getItem('tkd-sessions')||'[]');
  var td=new Date().toDateString();
  if(s.some(function(x){return new Date(x).toDateString()===td;})){alert('Already logged today! Great work!');return;}
  s.push(new Date().toISOString());
  localStorage.setItem('tkd-sessions',JSON.stringify(s));
  render();
}

var CC=null; // current challenge
var CT_RUNNING=false; // timer running
var CT_TIME=0; // time remaining
var CT_INTERVAL=null; // interval ref
var CC_SCORE=0; // current score being entered

function getChallengePB(id){
  try{var s=localStorage.getItem('tkd-pb-'+id);return s?parseInt(s):null;}catch(e){return null;}
}
function saveChallengePB(id,score){
  try{var pb=getChallengePB(id);if(!pb||score>pb)localStorage.setItem('tkd-pb-'+id,score);}catch(e){}
}
function startChallenge(idx){
  CC=CHALLENGES[idx];
  CT_RUNNING=false;CT_TIME=CC.duration;CC_SCORE=0;
  if(CT_INTERVAL)clearInterval(CT_INTERVAL);
  render();
  setTimeout(function(){var el=document.getElementById('challenge-box');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);
}
function startTimer(){
  if(CT_RUNNING)return;
  CT_RUNNING=true;CT_TIME=CC.duration;
  render();
  CT_INTERVAL=setInterval(function(){
    CT_TIME--;
    var el=document.getElementById('ct-time');
    if(el)el.textContent=CT_TIME;
    var bar=document.getElementById('ct-bar');
    if(bar)bar.style.width=((CT_TIME/CC.duration)*100)+'%';
    if(CT_TIME<=0){
      clearInterval(CT_INTERVAL);CT_INTERVAL=null;CT_RUNNING=false;
      render();
      setTimeout(function(){var el=document.getElementById('challenge-box');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);
    }
  },1000);
}
function submitScore(score){
  var s=parseInt(score);
  if(isNaN(s)||s<0)return;
  saveChallengePB(CC.id,s);
  CC=null;CT_RUNNING=false;CT_TIME=0;
  if(CT_INTERVAL){clearInterval(CT_INTERVAL);CT_INTERVAL=null;}
  render();
  setTimeout(function(){var el=document.getElementById('challenge-box');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);
}
function clearChallenge(){
  CC=null;CT_RUNNING=false;CT_TIME=0;
  if(CT_INTERVAL){clearInterval(CT_INTERVAL);CT_INTERVAL=null;}
  render();
}
function randomChallenge(){
  var idx=Math.floor(Math.random()*CHALLENGES.length);
  startChallenge(idx);
}

function rChallengeBox(){
  var h='<div id="challenge-box">';
  if(!CC){

    h+='<div style="font-size:13px;font-weight:700;color:var(--white);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">&#9889; Kicking Challenges</div>';
    h+='<div onclick="randomChallenge()" style="background:linear-gradient(135deg,rgba(232,25,60,.15),rgba(201,168,76,.08));border:2px dashed rgba(232,25,60,.4);border-radius:14px;padding:16px;text-align:center;cursor:pointer;touch-action:manipulation;margin-bottom:10px">'
      +'<div style="font-size:36px;margin-bottom:6px">&#9889;</div>'

      +'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    CHALLENGES.forEach(function(c,i){

    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden">'
      +'<div style="background:linear-gradient(135deg,rgba(232,25,60,.2),rgba(232,25,60,.05));padding:14px 16px;border-bottom:1px solid var(--border)">'

      +'<div style="font-size:20px;font-weight:900;color:var(--white)">&#9889; '+CC.name+'</div>'
      +'</div>'
      +'<div style="padding:16px">'
      +'<div style="font-size:14px;color:var(--text);margin-bottom:14px;text-align:center">How many did you get?</div>'
      +'<input id="score-input" type="number" min="0" placeholder="Enter your score" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--white);font-size:24px;padding:12px;border-radius:10px;outline:none;font-family:inherit;text-align:center;margin-bottom:10px"/>';
    var pb=getChallengePB(CC.id);
    if(pb)h+='<div style="font-size:12px;color:var(--gold);text-align:center;margin-bottom:10px">&#11088; Your PB: '+pb+' '+CC.unit+'</div>';
    h+='<button onclick="submitScore(CC_SCORE)" style="width:100%;background:linear-gradient(135deg,var(--red),#b01230);border:none;color:#fff;font-size:16px;font-weight:900;padding:14px;border-radius:12px;cursor:pointer;touch-action:manipulation;text-transform:uppercase;letter-spacing:1px">SAVE SCORE</button>'
      +'</div></div>';
  } else {
    // Challenge active - show timer
    var pb=getChallengePB(CC.id);
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden">'
      +'<div style="background:linear-gradient(135deg,rgba(232,25,60,.2),rgba(232,25,60,.05));padding:14px 16px;border-bottom:1px solid var(--border)">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<button onclick="clearChallenge()" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;cursor:pointer;touch-action:manipulation">&#8592; Back</button>'
      +(pb?'<span style="font-size:11px;color:var(--gold)">&#11088; PB: '+pb+' '+CC.unit+'</span>':'')
      +'</div>'
      +'<div style="font-size:20px;font-weight:900;color:var(--white)">&#9889; '+CC.name+'</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-top:4px">'+CC.desc+'</div>'
      +'</div>'
      +'<div style="padding:16px;text-align:center">'
      +'<div style="font-size:72px;font-weight:900;color:'+(CT_TIME<=10?'var(--red)':'var(--white)')+';line-height:1;margin-bottom:8px" id="ct-time">'+CT_TIME+'</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-bottom:14px">seconds remaining</div>'
      +'<div style="background:var(--border);height:8px;border-radius:4px;overflow:hidden;margin-bottom:16px">'
      +'<div id="ct-bar" style="height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:4px;transition:width .9s linear;width:'+((CT_TIME/CC.duration)*100)+'%"></div>'
      +'</div>'
      +(CT_RUNNING
        ?'<div style="font-size:14px;color:var(--gold);font-weight:700;font-style:italic;padding:10px">GO! GO! GO!</div>'
        :'<button onclick="startTimer()" style="width:100%;background:linear-gradient(135deg,var(--green),#1a7a30);border:none;color:#fff;font-size:18px;font-weight:900;padding:16px;border-radius:12px;cursor:pointer;touch-action:manipulation;text-transform:uppercase;letter-spacing:2px">&#9654; START</button>'
      )
      +'<div style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:10px;margin-top:12px">'
      +'<div style="font-size:11px;color:var(--gold);line-height:1.5">'+CC.tip+'</div>'
      +'</div>'
      +'</div></div>';
  }
  h+='</div>';
  return h;
}

function updateClock(){
  var now=new Date();
  var h=now.getHours().toString().padStart(2,'0');
  var m=now.getMinutes().toString().padStart(2,'0');
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var el=document.getElementById('clock');
  var del=document.getElementById('datebar');
  if(el) el.textContent=h+':'+m;
  if(del) del.textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];
}
updateClock();
setInterval(updateClock,1000);

var selectedVoiceIdx=-1;
function setVoice(idx){selectedVoiceIdx=parseInt(idx);}

function spk(word){
  try{
    var ss=window.speechSynthesis;
    ss.cancel();
    var u=new SpeechSynthesisUtterance(word);
    var voices=ss.getVoices();
    var v=null;
    if(selectedVoiceIdx>=0&&voices[selectedVoiceIdx]) v=voices[selectedVoiceIdx];
    else v=voices.find(function(v){return v.lang.indexOf('ko')===0;})
      ||voices.find(function(v){return v.name.toLowerCase().indexOf('male')>=0;})
      ||voices[0];
    if(v){u.voice=v;u.lang=v.lang;}
    u.rate=0.8;u.pitch=0.9;u.volume=1;
    ss.speak(u);
  }catch(ex){}
}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  if(window.speechSynthesis.onvoiceschanged!==undefined){
    window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
  }
}

var PWD="tkd399";
function checkPwd(){
  var val=document.getElementById('pwd-input').value.trim().toLowerCase();
  if(val===PWD){
    localStorage.setItem('tkd-auth',PWD);
    document.getElementById('pwd-screen').style.display='none';
    document.getElementById('pwd-err').textContent='';
  } else {
    document.getElementById('pwd-err').textContent='Wrong code. Try again.';
    document.getElementById('pwd-input').value='';
    document.getElementById('pwd-input').focus();
  }
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var ps=document.getElementById('pwd-screen');
    if(ps && ps.style.display!=='none') checkPwd();
  }
});
